name: drift
on:
  schedule:
    - cron: "17 3 * * *"   # nightly, off-peak
  workflow_dispatch: {}     # manual trigger for acceptance
permissions:
  contents: read
  issues: write
jobs:
  detect:
    runs-on: ubuntu-slim
    outputs:
      matrix: ${{ steps.m.outputs.matrix }}
      empty: ${{ steps.m.outputs.empty }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { fetch-depth: 0 }
      - uses: ship-iac/shipmate/actions/setup@74a0e452fb01577d8b61f8589b2a09b0c8112b7f
        with:
          terramate-version: ${{ vars.TERRAMATE_VERSION }}
          tofu-version: ${{ vars.TOFU_VERSION }}
      - id: m
        uses: ship-iac/shipmate/actions/build-matrix@74a0e452fb01577d8b61f8589b2a09b0c8112b7f
        with:
          base-sha: ""
          all-stacks: "true"
  drift:
    needs: detect
    if: needs.detect.outputs.empty == 'false'
    runs-on: ubuntu-slim
    permissions: { contents: read, issues: write }
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.detect.outputs.matrix) }}
    environment: ${{ matrix.environment }}
    name: drift / ${{ matrix.environment }} / ${{ matrix.stack }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { fetch-depth: 0 }
      - uses: ship-iac/shipmate/actions/setup@74a0e452fb01577d8b61f8589b2a09b0c8112b7f
        with:
          terramate-version: ${{ vars.TERRAMATE_VERSION }}
          tofu-version: ${{ vars.TOFU_VERSION }}
      - uses: ship-iac/shipmate/actions/drift-cell@74a0e452fb01577d8b61f8589b2a09b0c8112b7f
        with:
          stack: ${{ matrix.stack }}
          stack-name: ${{ matrix.stack }}
          env: ${{ matrix.environment }}
          state-path: ${{ matrix.stack }}/terraform.tfstate
          github-token: ${{ github.token }}
          slack-webhook: ${{ vars.SLACK_WEBHOOK }}
