name: preview
on: pull_request
concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  detect:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      empty: ${{ steps.matrix.outputs.empty }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { fetch-depth: 0 }
      - uses: ship-iac/shipmate/actions/setup@dc38d5fc201f833c899bdbeecd0a6fe1cd6b6821
        with:
          terramate-version: ${{ vars.TERRAMATE_VERSION }}
          tofu-version: ${{ vars.TOFU_VERSION }}
      - name: fmt check
        run: terramate fmt --check
      - name: stale codegen check
        run: terramate generate --detailed-exit-code
      - id: matrix
        uses: ship-iac/shipmate/actions/build-matrix@dc38d5fc201f833c899bdbeecd0a6fe1cd6b6821
        with:
          base-sha: ${{ github.event.pull_request.base.sha }}

  plan:
    needs: detect
    if: needs.detect.outputs.empty == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.detect.outputs.matrix) }}
    environment: ${{ matrix.environment }}
    name: plan / ${{ matrix.environment }} / ${{ matrix.stack }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { fetch-depth: 0 }
      - uses: ship-iac/shipmate/actions/setup@dc38d5fc201f833c899bdbeecd0a6fe1cd6b6821
        with:
          terramate-version: ${{ vars.TERRAMATE_VERSION }}
          tofu-version: ${{ vars.TOFU_VERSION }}
      - name: stack slug
        id: slug
        run: echo "slug=$(echo '${{ matrix.stack }}' | tr / -)" >> "$GITHUB_OUTPUT"
      - uses: ship-iac/shipmate/actions/state@dc38d5fc201f833c899bdbeecd0a6fe1cd6b6821
        with:
          stack-slug: ${{ steps.slug.outputs.slug }}
          env: ${{ matrix.environment }}
          mode: restore
          path: ${{ matrix.stack }}/terraform.tfstate
      - uses: ship-iac/shipmate/actions/plan-cell@dc38d5fc201f833c899bdbeecd0a6fe1cd6b6821
        with:
          stack: ${{ matrix.stack }}
          stack-name: ${{ matrix.stack }}
          env: ${{ matrix.environment }}
          head-sha: ${{ github.event.pull_request.head.sha }}
          github-token: ${{ github.token }}

  summary:
    needs: [detect, plan]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: cell-summary-*
          path: cells
      - uses: ship-iac/shipmate/actions/summary@dc38d5fc201f833c899bdbeecd0a6fe1cd6b6821
        with:
          pr-number: ${{ github.event.pull_request.number }}
          head-sha: ${{ github.event.pull_request.head.sha }}
          plan-result: ${{ needs.plan.result }}
          detect-result: ${{ needs.detect.result }}
          github-token: ${{ github.token }}
