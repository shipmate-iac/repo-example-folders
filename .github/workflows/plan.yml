name: shipmate · plan
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
concurrency:
  group: plan-${{ github.event.pull_request.number }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  detect:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-slim
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      empty: ${{ steps.matrix.outputs.empty }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with: { fetch-depth: 0 }
      - uses: ship-iac/shipmate/actions/setup@2868122c6b372146e0879556e3dcb9f226265f6b
        with:
          terramate-version: ${{ vars.TERRAMATE_VERSION }}
          tofu-version: ${{ vars.TOFU_VERSION }}
      - name: fmt check
        run: terramate fmt --check
      - name: stale codegen check
        run: terramate generate --detailed-exit-code
      - id: matrix
        uses: ship-iac/shipmate/actions/build-matrix@2868122c6b372146e0879556e3dcb9f226265f6b
        with:
          base-sha: ${{ github.event.pull_request.base.sha }}

  plan:
    needs: detect
    if: needs.detect.outputs.empty == 'false'
    runs-on: ubuntu-slim
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.detect.outputs.matrix) }}
    environment: ${{ matrix.environment }}
    name: ${{ matrix.stack }} / ${{ matrix.environment }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with: { fetch-depth: 0 }
      - uses: ship-iac/shipmate/actions/setup@2868122c6b372146e0879556e3dcb9f226265f6b
        with:
          terramate-version: ${{ vars.TERRAMATE_VERSION }}
          tofu-version: ${{ vars.TOFU_VERSION }}
      - name: stack slug
        id: slug
        run: echo "slug=$(echo '${{ matrix.stack }}' | tr / -)" >> "$GITHUB_OUTPUT"
      - uses: ship-iac/shipmate/actions/state@2868122c6b372146e0879556e3dcb9f226265f6b
        with:
          stack-slug: ${{ steps.slug.outputs.slug }}
          env: ${{ matrix.environment }}
          mode: restore
          path: ${{ matrix.stack }}/terraform.tfstate
      - uses: ship-iac/shipmate/actions/plan-cell@2868122c6b372146e0879556e3dcb9f226265f6b
        with:
          stack: ${{ matrix.stack }}
          stack-name: ${{ matrix.stack }}
          env: ${{ matrix.environment }}

  summary:
    needs: [detect, plan]
    if: ${{ always() && github.event.pull_request.draft == false }}
    runs-on: ubuntu-slim
    # Apply checks, shipmate/gate status and the sticky comment are authored by
    # the shipmate App (summary mints its own installation token via
    # app-id/private-key); GITHUB_TOKEN needs nothing beyond same-run artifacts.
    permissions:
      contents: read
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: cell-summary.*
          path: cells
      - uses: ship-iac/shipmate/actions/summary@2868122c6b372146e0879556e3dcb9f226265f6b
        with:
          pr-number: ${{ github.event.pull_request.number }}
          head-sha: ${{ github.event.pull_request.head.sha }}
          plan-result: ${{ needs.plan.result }}
          detect-result: ${{ needs.detect.result }}
          app-id: ${{ vars.SHIPMATE_APP_ID }}
          private-key: ${{ secrets.SHIPMATE_APP_PRIVATE_KEY }}
