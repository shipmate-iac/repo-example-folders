name: deploy
on:
  push:
    branches: [main]
concurrency:
  group: deploy-main
  cancel-in-progress: false
permissions:
  contents: read
  checks: write
  pull-requests: read
  actions: read
jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      wave0: ${{ steps.d.outputs.wave0 }}
      wave1: ${{ steps.d.outputs.wave1 }}
      wave2: ${{ steps.d.outputs.wave2 }}
      wave3: ${{ steps.d.outputs.wave3 }}
      wave4: ${{ steps.d.outputs.wave4 }}
      wave5: ${{ steps.d.outputs.wave5 }}
      wave6: ${{ steps.d.outputs.wave6 }}
      wave7: ${{ steps.d.outputs.wave7 }}
      head_sha: ${{ steps.d.outputs.head_sha }}
      preview_run_id: ${{ steps.d.outputs.preview_run_id }}
      empty: ${{ steps.d.outputs.empty }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with: { fetch-depth: 0 }
      - uses: shipmate-iac/shipmate/actions/setup@25d57c38bf04df01c06cedf3f0162d1cd393116e
        with:
          terramate-version: ${{ vars.TERRAMATE_VERSION }}
          tofu-version: ${{ vars.TOFU_VERSION }}
      - id: d
        uses: shipmate-iac/shipmate/actions/deploy-detect@25d57c38bf04df01c06cedf3f0162d1cd393116e
        with:
          base-sha: ${{ github.event.before }}
          github-token: ${{ github.token }}

  wave0:
    needs: [detect]
    if: ${{ !failure() && !cancelled() && needs.detect.outputs.wave0 != '[]' }}
    runs-on: ubuntu-latest
    permissions: { contents: read, checks: write, actions: read }
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.detect.outputs.wave0) }}
    environment: ${{ matrix.environment }}-apply
    concurrency:
      group: apply-${{ matrix.environment }}-${{ matrix.stack }}
      cancel-in-progress: false
    name: apply / ${{ matrix.environment }} / ${{ matrix.stack }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with: { fetch-depth: 0 }
      - uses: shipmate-iac/shipmate/actions/setup@25d57c38bf04df01c06cedf3f0162d1cd393116e
        with:
          terramate-version: ${{ vars.TERRAMATE_VERSION }}
          tofu-version: ${{ vars.TOFU_VERSION }}
      - uses: shipmate-iac/shipmate/actions/apply-cell@25d57c38bf04df01c06cedf3f0162d1cd393116e
        with:
          stack: ${{ matrix.stack }}
          stack-name: ${{ matrix.stack }}
          env: ${{ matrix.environment }}
          head-sha: ${{ needs.detect.outputs.head_sha }}
          preview-run-id: ${{ needs.detect.outputs.preview_run_id }}
          state-path: ${{ matrix.stack }}/terraform.tfstate
          github-token: ${{ github.token }}

  wave1:
    needs: [detect, wave0]
    if: ${{ !failure() && !cancelled() && needs.detect.outputs.wave1 != '[]' }}
    runs-on: ubuntu-latest
    permissions: { contents: read, checks: write, actions: read }
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.detect.outputs.wave1) }}
    environment: ${{ matrix.environment }}-apply
    concurrency:
      group: apply-${{ matrix.environment }}-${{ matrix.stack }}
      cancel-in-progress: false
    name: apply / ${{ matrix.environment }} / ${{ matrix.stack }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with: { fetch-depth: 0 }
      - uses: shipmate-iac/shipmate/actions/setup@25d57c38bf04df01c06cedf3f0162d1cd393116e
        with:
          terramate-version: ${{ vars.TERRAMATE_VERSION }}
          tofu-version: ${{ vars.TOFU_VERSION }}
      - uses: shipmate-iac/shipmate/actions/apply-cell@25d57c38bf04df01c06cedf3f0162d1cd393116e
        with:
          stack: ${{ matrix.stack }}
          stack-name: ${{ matrix.stack }}
          env: ${{ matrix.environment }}
          head-sha: ${{ needs.detect.outputs.head_sha }}
          preview-run-id: ${{ needs.detect.outputs.preview_run_id }}
          state-path: ${{ matrix.stack }}/terraform.tfstate
          github-token: ${{ github.token }}

  wave2:
    needs: [detect, wave0, wave1]
    if: ${{ !failure() && !cancelled() && needs.detect.outputs.wave2 != '[]' }}
    runs-on: ubuntu-latest
    permissions: { contents: read, checks: write, actions: read }
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.detect.outputs.wave2) }}
    environment: ${{ matrix.environment }}-apply
    concurrency:
      group: apply-${{ matrix.environment }}-${{ matrix.stack }}
      cancel-in-progress: false
    name: apply / ${{ matrix.environment }} / ${{ matrix.stack }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with: { fetch-depth: 0 }
      - uses: shipmate-iac/shipmate/actions/setup@25d57c38bf04df01c06cedf3f0162d1cd393116e
        with:
          terramate-version: ${{ vars.TERRAMATE_VERSION }}
          tofu-version: ${{ vars.TOFU_VERSION }}
      - uses: shipmate-iac/shipmate/actions/apply-cell@25d57c38bf04df01c06cedf3f0162d1cd393116e
        with:
          stack: ${{ matrix.stack }}
          stack-name: ${{ matrix.stack }}
          env: ${{ matrix.environment }}
          head-sha: ${{ needs.detect.outputs.head_sha }}
          preview-run-id: ${{ needs.detect.outputs.preview_run_id }}
          state-path: ${{ matrix.stack }}/terraform.tfstate
          github-token: ${{ github.token }}

  wave3:
    needs: [detect, wave0, wave1, wave2]
    if: ${{ !failure() && !cancelled() && needs.detect.outputs.wave3 != '[]' }}
    runs-on: ubuntu-latest
    permissions: { contents: read, checks: write, actions: read }
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.detect.outputs.wave3) }}
    environment: ${{ matrix.environment }}-apply
    concurrency:
      group: apply-${{ matrix.environment }}-${{ matrix.stack }}
      cancel-in-progress: false
    name: apply / ${{ matrix.environment }} / ${{ matrix.stack }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with: { fetch-depth: 0 }
      - uses: shipmate-iac/shipmate/actions/setup@25d57c38bf04df01c06cedf3f0162d1cd393116e
        with:
          terramate-version: ${{ vars.TERRAMATE_VERSION }}
          tofu-version: ${{ vars.TOFU_VERSION }}
      - uses: shipmate-iac/shipmate/actions/apply-cell@25d57c38bf04df01c06cedf3f0162d1cd393116e
        with:
          stack: ${{ matrix.stack }}
          stack-name: ${{ matrix.stack }}
          env: ${{ matrix.environment }}
          head-sha: ${{ needs.detect.outputs.head_sha }}
          preview-run-id: ${{ needs.detect.outputs.preview_run_id }}
          state-path: ${{ matrix.stack }}/terraform.tfstate
          github-token: ${{ github.token }}

  wave4:
    needs: [detect, wave0, wave1, wave2, wave3]
    if: ${{ !failure() && !cancelled() && needs.detect.outputs.wave4 != '[]' }}
    runs-on: ubuntu-latest
    permissions: { contents: read, checks: write, actions: read }
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.detect.outputs.wave4) }}
    environment: ${{ matrix.environment }}-apply
    concurrency:
      group: apply-${{ matrix.environment }}-${{ matrix.stack }}
      cancel-in-progress: false
    name: apply / ${{ matrix.environment }} / ${{ matrix.stack }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with: { fetch-depth: 0 }
      - uses: shipmate-iac/shipmate/actions/setup@25d57c38bf04df01c06cedf3f0162d1cd393116e
        with:
          terramate-version: ${{ vars.TERRAMATE_VERSION }}
          tofu-version: ${{ vars.TOFU_VERSION }}
      - uses: shipmate-iac/shipmate/actions/apply-cell@25d57c38bf04df01c06cedf3f0162d1cd393116e
        with:
          stack: ${{ matrix.stack }}
          stack-name: ${{ matrix.stack }}
          env: ${{ matrix.environment }}
          head-sha: ${{ needs.detect.outputs.head_sha }}
          preview-run-id: ${{ needs.detect.outputs.preview_run_id }}
          state-path: ${{ matrix.stack }}/terraform.tfstate
          github-token: ${{ github.token }}

  wave5:
    needs: [detect, wave0, wave1, wave2, wave3, wave4]
    if: ${{ !failure() && !cancelled() && needs.detect.outputs.wave5 != '[]' }}
    runs-on: ubuntu-latest
    permissions: { contents: read, checks: write, actions: read }
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.detect.outputs.wave5) }}
    environment: ${{ matrix.environment }}-apply
    concurrency:
      group: apply-${{ matrix.environment }}-${{ matrix.stack }}
      cancel-in-progress: false
    name: apply / ${{ matrix.environment }} / ${{ matrix.stack }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with: { fetch-depth: 0 }
      - uses: shipmate-iac/shipmate/actions/setup@25d57c38bf04df01c06cedf3f0162d1cd393116e
        with:
          terramate-version: ${{ vars.TERRAMATE_VERSION }}
          tofu-version: ${{ vars.TOFU_VERSION }}
      - uses: shipmate-iac/shipmate/actions/apply-cell@25d57c38bf04df01c06cedf3f0162d1cd393116e
        with:
          stack: ${{ matrix.stack }}
          stack-name: ${{ matrix.stack }}
          env: ${{ matrix.environment }}
          head-sha: ${{ needs.detect.outputs.head_sha }}
          preview-run-id: ${{ needs.detect.outputs.preview_run_id }}
          state-path: ${{ matrix.stack }}/terraform.tfstate
          github-token: ${{ github.token }}

  wave6:
    needs: [detect, wave0, wave1, wave2, wave3, wave4, wave5]
    if: ${{ !failure() && !cancelled() && needs.detect.outputs.wave6 != '[]' }}
    runs-on: ubuntu-latest
    permissions: { contents: read, checks: write, actions: read }
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.detect.outputs.wave6) }}
    environment: ${{ matrix.environment }}-apply
    concurrency:
      group: apply-${{ matrix.environment }}-${{ matrix.stack }}
      cancel-in-progress: false
    name: apply / ${{ matrix.environment }} / ${{ matrix.stack }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with: { fetch-depth: 0 }
      - uses: shipmate-iac/shipmate/actions/setup@25d57c38bf04df01c06cedf3f0162d1cd393116e
        with:
          terramate-version: ${{ vars.TERRAMATE_VERSION }}
          tofu-version: ${{ vars.TOFU_VERSION }}
      - uses: shipmate-iac/shipmate/actions/apply-cell@25d57c38bf04df01c06cedf3f0162d1cd393116e
        with:
          stack: ${{ matrix.stack }}
          stack-name: ${{ matrix.stack }}
          env: ${{ matrix.environment }}
          head-sha: ${{ needs.detect.outputs.head_sha }}
          preview-run-id: ${{ needs.detect.outputs.preview_run_id }}
          state-path: ${{ matrix.stack }}/terraform.tfstate
          github-token: ${{ github.token }}

  wave7:
    needs: [detect, wave0, wave1, wave2, wave3, wave4, wave5, wave6]
    if: ${{ !failure() && !cancelled() && needs.detect.outputs.wave7 != '[]' }}
    runs-on: ubuntu-latest
    permissions: { contents: read, checks: write, actions: read }
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.detect.outputs.wave7) }}
    environment: ${{ matrix.environment }}-apply
    concurrency:
      group: apply-${{ matrix.environment }}-${{ matrix.stack }}
      cancel-in-progress: false
    name: apply / ${{ matrix.environment }} / ${{ matrix.stack }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with: { fetch-depth: 0 }
      - uses: shipmate-iac/shipmate/actions/setup@25d57c38bf04df01c06cedf3f0162d1cd393116e
        with:
          terramate-version: ${{ vars.TERRAMATE_VERSION }}
          tofu-version: ${{ vars.TOFU_VERSION }}
      - uses: shipmate-iac/shipmate/actions/apply-cell@25d57c38bf04df01c06cedf3f0162d1cd393116e
        with:
          stack: ${{ matrix.stack }}
          stack-name: ${{ matrix.stack }}
          env: ${{ matrix.environment }}
          head-sha: ${{ needs.detect.outputs.head_sha }}
          preview-run-id: ${{ needs.detect.outputs.preview_run_id }}
          state-path: ${{ matrix.stack }}/terraform.tfstate
          github-token: ${{ github.token }}

  summary:
    needs: [detect, wave0, wave1, wave2, wave3, wave4, wave5, wave6, wave7]
    if: always()
    runs-on: ubuntu-latest
    permissions: { checks: write }
    steps:
      - name: Complete checkmate on the merged PR head SHA
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ needs.detect.outputs.head_sha }}
          RESULTS: ${{ join(needs.*.result, ',') }}
        run: |
          set -euo pipefail
          if echo "$RESULTS" | grep -q failure; then concl=failure; title="deploy incomplete";
          else concl=success; title="all waves applied"; fi
          python3 - "$HEAD_SHA" "$concl" "$title" > body.json <<'PY'
          import json, sys
          head, concl, title = sys.argv[1:4]
          print(json.dumps({"name": "shipmate / checkmate", "head_sha": head,
              "status": "completed", "conclusion": concl,
              "output": {"title": title, "summary": "Deploy wave applies completed."}}))
          PY
          gh api "repos/$GITHUB_REPOSITORY/check-runs" --input body.json >/dev/null
      - name: Slack on failed deploy (outranks drift)
        if: ${{ contains(join(needs.*.result, ','), 'failure') && vars.SLACK_WEBHOOK != '' }}
        env:
          SLACK: ${{ vars.SLACK_WEBHOOK }}
        run: |
          set -euo pipefail
          python3 -c "import json;open('p.json','w').write(json.dumps({'text':':rotating_light: shipmate deploy failed on main — a wave apply failed.'}))"
          curl -sS -X POST -H 'Content-Type: application/json' --data @p.json "$SLACK" >/dev/null
