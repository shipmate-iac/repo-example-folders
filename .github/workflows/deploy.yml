name: deploy
on:
  push:
    branches: [main]
concurrency:
  group: deploy-main
  cancel-in-progress: false
permissions:
  contents: read
  checks: write
  pull-requests: read
  actions: read
jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      envlevel0_waves: ${{ steps.d.outputs.envlevel0_waves }}
      envlevel1_waves: ${{ steps.d.outputs.envlevel1_waves }}
      envlevel2_waves: ${{ steps.d.outputs.envlevel2_waves }}
      envlevel3_waves: ${{ steps.d.outputs.envlevel3_waves }}
      envlevel0_empty: ${{ steps.d.outputs.envlevel0_empty }}
      envlevel1_empty: ${{ steps.d.outputs.envlevel1_empty }}
      envlevel2_empty: ${{ steps.d.outputs.envlevel2_empty }}
      envlevel3_empty: ${{ steps.d.outputs.envlevel3_empty }}
      head_sha: ${{ steps.d.outputs.head_sha }}
      preview_run_id: ${{ steps.d.outputs.preview_run_id }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with: { fetch-depth: 0 }
      - uses: ship-iac/shipmate/actions/setup@dc38d5fc201f833c899bdbeecd0a6fe1cd6b6821
        with:
          terramate-version: ${{ vars.TERRAMATE_VERSION }}
          tofu-version: ${{ vars.TOFU_VERSION }}
      - id: d
        uses: ship-iac/shipmate/actions/deploy-detect@dc38d5fc201f833c899bdbeecd0a6fe1cd6b6821
        with:
          base-sha: ${{ github.event.before }}
          github-token: ${{ github.token }}

  envlevel0:
    needs: [detect]
    if: ${{ !failure() && !cancelled() && needs.detect.outputs.envlevel0_empty != 'true' }}
    uses: ship-iac/shipmate/.github/workflows/apply-env-level.yml@dc38d5fc201f833c899bdbeecd0a6fe1cd6b6821
    permissions: { contents: read, checks: write, actions: read }
    with:
      waves_json: ${{ needs.detect.outputs.envlevel0_waves }}
      head_sha: ${{ needs.detect.outputs.head_sha }}
      preview_run_id: ${{ needs.detect.outputs.preview_run_id }}
      state_suffix: terraform.tfstate

  envlevel1:
    needs: [detect, envlevel0]
    if: ${{ !failure() && !cancelled() && needs.detect.outputs.envlevel1_empty != 'true' }}
    uses: ship-iac/shipmate/.github/workflows/apply-env-level.yml@dc38d5fc201f833c899bdbeecd0a6fe1cd6b6821
    permissions: { contents: read, checks: write, actions: read }
    with:
      waves_json: ${{ needs.detect.outputs.envlevel1_waves }}
      head_sha: ${{ needs.detect.outputs.head_sha }}
      preview_run_id: ${{ needs.detect.outputs.preview_run_id }}
      state_suffix: terraform.tfstate

  envlevel2:
    needs: [detect, envlevel0, envlevel1]
    if: ${{ !failure() && !cancelled() && needs.detect.outputs.envlevel2_empty != 'true' }}
    uses: ship-iac/shipmate/.github/workflows/apply-env-level.yml@dc38d5fc201f833c899bdbeecd0a6fe1cd6b6821
    permissions: { contents: read, checks: write, actions: read }
    with:
      waves_json: ${{ needs.detect.outputs.envlevel2_waves }}
      head_sha: ${{ needs.detect.outputs.head_sha }}
      preview_run_id: ${{ needs.detect.outputs.preview_run_id }}
      state_suffix: terraform.tfstate

  envlevel3:
    needs: [detect, envlevel0, envlevel1, envlevel2]
    if: ${{ !failure() && !cancelled() && needs.detect.outputs.envlevel3_empty != 'true' }}
    uses: ship-iac/shipmate/.github/workflows/apply-env-level.yml@dc38d5fc201f833c899bdbeecd0a6fe1cd6b6821
    permissions: { contents: read, checks: write, actions: read }
    with:
      waves_json: ${{ needs.detect.outputs.envlevel3_waves }}
      head_sha: ${{ needs.detect.outputs.head_sha }}
      preview_run_id: ${{ needs.detect.outputs.preview_run_id }}
      state_suffix: terraform.tfstate

  summary:
    needs: [detect, envlevel0, envlevel1, envlevel2, envlevel3]
    if: always()
    runs-on: ubuntu-latest
    permissions: { checks: write }
    steps:
      - name: Complete checkmate on the merged PR head SHA
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ needs.detect.outputs.head_sha }}
          RESULTS: ${{ join(needs.*.result, ',') }}
        run: |
          set -euo pipefail
          if echo "$RESULTS" | grep -q failure; then concl=failure; title="deploy incomplete";
          else concl=success; title="all env-levels applied"; fi
          python3 - "$HEAD_SHA" "$concl" "$title" > body.json <<'PY'
          import json, sys
          head, concl, title = sys.argv[1:4]
          print(json.dumps({"name": "shipmate / checkmate", "head_sha": head,
              "status": "completed", "conclusion": concl,
              "output": {"title": title, "summary": "Deploy env-level applies completed."}}))
          PY
          gh api "repos/$GITHUB_REPOSITORY/check-runs" --input body.json >/dev/null
      - name: Slack on failed deploy (outranks drift)
        if: ${{ contains(join(needs.*.result, ','), 'failure') && vars.SLACK_WEBHOOK != '' }}
        env:
          SLACK: ${{ vars.SLACK_WEBHOOK }}
        run: |
          set -euo pipefail
          python3 -c "import json;open('p.json','w').write(json.dumps({'text':':rotating_light: shipmate deploy failed on main — a wave apply failed.'}))"
          curl -sS -X POST -H 'Content-Type: application/json' --data @p.json "$SLACK" >/dev/null
