name: deploy
on:
  push:
    branches: [main]
concurrency:
  group: deploy-main
  cancel-in-progress: false
permissions:
  contents: read
  checks: write
  pull-requests: read
  actions: read
jobs:
  deploy:
    uses: ship-iac/shipmate/.github/workflows/deploy.yml@dcd760e86a2d02ee7c2a0d3a9277d4da262a6dab
    permissions: { contents: read, checks: write, statuses: write, pull-requests: read, actions: read }
    secrets: inherit
    with:
      state_suffix: terraform.tfstate
