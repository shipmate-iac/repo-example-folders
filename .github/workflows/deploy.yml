name: deploy
on:
  push:
    branches: [main]
concurrency:
  group: deploy-main
  cancel-in-progress: false
permissions:
  contents: read
  checks: write
  pull-requests: read
  actions: read
jobs:
  deploy:
    uses: ship-iac/shipmate/.github/workflows/deploy.yml@6adc944eec3c80e9dd64d33a6a2070c08b1b2d29
    permissions: { contents: read, checks: write, pull-requests: read, actions: read }
    secrets: inherit
    with:
      state_suffix: terraform.tfstate
