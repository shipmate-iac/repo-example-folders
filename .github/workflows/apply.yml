name: apply
on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment (empty = bare `shipmate apply`, all non-explicit environments)
        required: false
        default: ''
      ref: { description: PR head SHA to apply, required: true }
      pr_number: { description: PR number, required: true }
      plan_run_id: { description: Plan run id with the reviewed plans, required: true }
permissions:
  contents: read
  checks: write
  actions: read
  pull-requests: read
jobs:
  targeted:
    if: ${{ inputs.environment != '' }}
    uses: ship-iac/shipmate/.github/workflows/apply.yml@74a0e452fb01577d8b61f8589b2a09b0c8112b7f
    permissions: { contents: read, checks: write, actions: read }
    secrets: inherit
    with:
      environment: ${{ inputs.environment }}
      ref: ${{ inputs.ref }}
      pr_number: ${{ inputs.pr_number }}
      plan_run_id: ${{ inputs.plan_run_id }}
      state_suffix: terraform.tfstate
  all:
    if: ${{ inputs.environment == '' }}
    uses: ship-iac/shipmate/.github/workflows/apply-all.yml@74a0e452fb01577d8b61f8589b2a09b0c8112b7f
    permissions: { contents: read, checks: write, actions: read }
    secrets: inherit
    with:
      ref: ${{ inputs.ref }}
      pr_number: ${{ inputs.pr_number }}
      plan_run_id: ${{ inputs.plan_run_id }}
      state_suffix: terraform.tfstate
