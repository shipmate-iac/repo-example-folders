name: apply
on:
  workflow_dispatch:
    inputs:
      environment: { description: Target environment, required: true }
      ref: { description: PR head SHA to apply, required: true }
      pr_number: { description: PR number, required: true }
      plan_run_id: { description: Preview run id with the reviewed plans, required: true }
permissions:
  contents: read
  checks: write
  actions: read
  pull-requests: read
jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      wave0: ${{ steps.d.outputs.wave0 }}
      wave1: ${{ steps.d.outputs.wave1 }}
      wave2: ${{ steps.d.outputs.wave2 }}
      wave3: ${{ steps.d.outputs.wave3 }}
      wave4: ${{ steps.d.outputs.wave4 }}
      wave5: ${{ steps.d.outputs.wave5 }}
      wave6: ${{ steps.d.outputs.wave6 }}
      wave7: ${{ steps.d.outputs.wave7 }}
      head_sha: ${{ steps.d.outputs.head_sha }}
      preview_run_id: ${{ steps.d.outputs.preview_run_id }}
      empty: ${{ steps.d.outputs.empty }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.ref }}
      - uses: ship-iac/shipmate/actions/setup@dc38d5fc201f833c899bdbeecd0a6fe1cd6b6821
        with:
          terramate-version: ${{ vars.TERRAMATE_VERSION }}
          tofu-version: ${{ vars.TOFU_VERSION }}
      - id: d
        uses: ship-iac/shipmate/actions/apply-detect@dc38d5fc201f833c899bdbeecd0a6fe1cd6b6821
        with:
          environment: ${{ github.event.inputs.environment }}
          plan-run-id: ${{ github.event.inputs.plan_run_id }}
          head-sha: ${{ github.event.inputs.ref }}
          github-token: ${{ github.token }}

  wave0:
    needs: [detect]
    if: ${{ !failure() && !cancelled() && needs.detect.outputs.wave0 != '[]' }}
    runs-on: ubuntu-latest
    permissions: { contents: read, checks: write, actions: read }
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.detect.outputs.wave0) }}
    environment: ${{ matrix.environment }}-apply
    concurrency:
      group: apply-${{ matrix.environment }}-${{ matrix.stack }}
      cancel-in-progress: false
    name: apply / ${{ matrix.environment }} / ${{ matrix.stack }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          ref: ${{ needs.detect.outputs.head_sha }}
      - uses: ship-iac/shipmate/actions/setup@dc38d5fc201f833c899bdbeecd0a6fe1cd6b6821
        with:
          terramate-version: ${{ vars.TERRAMATE_VERSION }}
          tofu-version: ${{ vars.TOFU_VERSION }}
      - uses: ship-iac/shipmate/actions/apply-cell@dc38d5fc201f833c899bdbeecd0a6fe1cd6b6821
        with:
          stack: ${{ matrix.stack }}
          stack-name: ${{ matrix.stack }}
          env: ${{ matrix.environment }}
          head-sha: ${{ needs.detect.outputs.head_sha }}
          preview-run-id: ${{ needs.detect.outputs.preview_run_id }}
          state-path: ${{ matrix.stack }}/terraform.tfstate
          github-token: ${{ github.token }}

  wave1:
    needs: [detect, wave0]
    if: ${{ !failure() && !cancelled() && needs.detect.outputs.wave1 != '[]' }}
    runs-on: ubuntu-latest
    permissions: { contents: read, checks: write, actions: read }
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.detect.outputs.wave1) }}
    environment: ${{ matrix.environment }}-apply
    concurrency:
      group: apply-${{ matrix.environment }}-${{ matrix.stack }}
      cancel-in-progress: false
    name: apply / ${{ matrix.environment }} / ${{ matrix.stack }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          ref: ${{ needs.detect.outputs.head_sha }}
      - uses: ship-iac/shipmate/actions/setup@dc38d5fc201f833c899bdbeecd0a6fe1cd6b6821
        with:
          terramate-version: ${{ vars.TERRAMATE_VERSION }}
          tofu-version: ${{ vars.TOFU_VERSION }}
      - uses: ship-iac/shipmate/actions/apply-cell@dc38d5fc201f833c899bdbeecd0a6fe1cd6b6821
        with:
          stack: ${{ matrix.stack }}
          stack-name: ${{ matrix.stack }}
          env: ${{ matrix.environment }}
          head-sha: ${{ needs.detect.outputs.head_sha }}
          preview-run-id: ${{ needs.detect.outputs.preview_run_id }}
          state-path: ${{ matrix.stack }}/terraform.tfstate
          github-token: ${{ github.token }}

  wave2:
    needs: [detect, wave0, wave1]
    if: ${{ !failure() && !cancelled() && needs.detect.outputs.wave2 != '[]' }}
    runs-on: ubuntu-latest
    permissions: { contents: read, checks: write, actions: read }
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.detect.outputs.wave2) }}
    environment: ${{ matrix.environment }}-apply
    concurrency:
      group: apply-${{ matrix.environment }}-${{ matrix.stack }}
      cancel-in-progress: false
    name: apply / ${{ matrix.environment }} / ${{ matrix.stack }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          ref: ${{ needs.detect.outputs.head_sha }}
      - uses: ship-iac/shipmate/actions/setup@dc38d5fc201f833c899bdbeecd0a6fe1cd6b6821
        with:
          terramate-version: ${{ vars.TERRAMATE_VERSION }}
          tofu-version: ${{ vars.TOFU_VERSION }}
      - uses: ship-iac/shipmate/actions/apply-cell@dc38d5fc201f833c899bdbeecd0a6fe1cd6b6821
        with:
          stack: ${{ matrix.stack }}
          stack-name: ${{ matrix.stack }}
          env: ${{ matrix.environment }}
          head-sha: ${{ needs.detect.outputs.head_sha }}
          preview-run-id: ${{ needs.detect.outputs.preview_run_id }}
          state-path: ${{ matrix.stack }}/terraform.tfstate
          github-token: ${{ github.token }}

  wave3:
    needs: [detect, wave0, wave1, wave2]
    if: ${{ !failure() && !cancelled() && needs.detect.outputs.wave3 != '[]' }}
    runs-on: ubuntu-latest
    permissions: { contents: read, checks: write, actions: read }
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.detect.outputs.wave3) }}
    environment: ${{ matrix.environment }}-apply
    concurrency:
      group: apply-${{ matrix.environment }}-${{ matrix.stack }}
      cancel-in-progress: false
    name: apply / ${{ matrix.environment }} / ${{ matrix.stack }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          ref: ${{ needs.detect.outputs.head_sha }}
      - uses: ship-iac/shipmate/actions/setup@dc38d5fc201f833c899bdbeecd0a6fe1cd6b6821
        with:
          terramate-version: ${{ vars.TERRAMATE_VERSION }}
          tofu-version: ${{ vars.TOFU_VERSION }}
      - uses: ship-iac/shipmate/actions/apply-cell@dc38d5fc201f833c899bdbeecd0a6fe1cd6b6821
        with:
          stack: ${{ matrix.stack }}
          stack-name: ${{ matrix.stack }}
          env: ${{ matrix.environment }}
          head-sha: ${{ needs.detect.outputs.head_sha }}
          preview-run-id: ${{ needs.detect.outputs.preview_run_id }}
          state-path: ${{ matrix.stack }}/terraform.tfstate
          github-token: ${{ github.token }}

  wave4:
    needs: [detect, wave0, wave1, wave2, wave3]
    if: ${{ !failure() && !cancelled() && needs.detect.outputs.wave4 != '[]' }}
    runs-on: ubuntu-latest
    permissions: { contents: read, checks: write, actions: read }
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.detect.outputs.wave4) }}
    environment: ${{ matrix.environment }}-apply
    concurrency:
      group: apply-${{ matrix.environment }}-${{ matrix.stack }}
      cancel-in-progress: false
    name: apply / ${{ matrix.environment }} / ${{ matrix.stack }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          ref: ${{ needs.detect.outputs.head_sha }}
      - uses: ship-iac/shipmate/actions/setup@dc38d5fc201f833c899bdbeecd0a6fe1cd6b6821
        with:
          terramate-version: ${{ vars.TERRAMATE_VERSION }}
          tofu-version: ${{ vars.TOFU_VERSION }}
      - uses: ship-iac/shipmate/actions/apply-cell@dc38d5fc201f833c899bdbeecd0a6fe1cd6b6821
        with:
          stack: ${{ matrix.stack }}
          stack-name: ${{ matrix.stack }}
          env: ${{ matrix.environment }}
          head-sha: ${{ needs.detect.outputs.head_sha }}
          preview-run-id: ${{ needs.detect.outputs.preview_run_id }}
          state-path: ${{ matrix.stack }}/terraform.tfstate
          github-token: ${{ github.token }}

  wave5:
    needs: [detect, wave0, wave1, wave2, wave3, wave4]
    if: ${{ !failure() && !cancelled() && needs.detect.outputs.wave5 != '[]' }}
    runs-on: ubuntu-latest
    permissions: { contents: read, checks: write, actions: read }
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.detect.outputs.wave5) }}
    environment: ${{ matrix.environment }}-apply
    concurrency:
      group: apply-${{ matrix.environment }}-${{ matrix.stack }}
      cancel-in-progress: false
    name: apply / ${{ matrix.environment }} / ${{ matrix.stack }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          ref: ${{ needs.detect.outputs.head_sha }}
      - uses: ship-iac/shipmate/actions/setup@dc38d5fc201f833c899bdbeecd0a6fe1cd6b6821
        with:
          terramate-version: ${{ vars.TERRAMATE_VERSION }}
          tofu-version: ${{ vars.TOFU_VERSION }}
      - uses: ship-iac/shipmate/actions/apply-cell@dc38d5fc201f833c899bdbeecd0a6fe1cd6b6821
        with:
          stack: ${{ matrix.stack }}
          stack-name: ${{ matrix.stack }}
          env: ${{ matrix.environment }}
          head-sha: ${{ needs.detect.outputs.head_sha }}
          preview-run-id: ${{ needs.detect.outputs.preview_run_id }}
          state-path: ${{ matrix.stack }}/terraform.tfstate
          github-token: ${{ github.token }}

  wave6:
    needs: [detect, wave0, wave1, wave2, wave3, wave4, wave5]
    if: ${{ !failure() && !cancelled() && needs.detect.outputs.wave6 != '[]' }}
    runs-on: ubuntu-latest
    permissions: { contents: read, checks: write, actions: read }
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.detect.outputs.wave6) }}
    environment: ${{ matrix.environment }}-apply
    concurrency:
      group: apply-${{ matrix.environment }}-${{ matrix.stack }}
      cancel-in-progress: false
    name: apply / ${{ matrix.environment }} / ${{ matrix.stack }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          ref: ${{ needs.detect.outputs.head_sha }}
      - uses: ship-iac/shipmate/actions/setup@dc38d5fc201f833c899bdbeecd0a6fe1cd6b6821
        with:
          terramate-version: ${{ vars.TERRAMATE_VERSION }}
          tofu-version: ${{ vars.TOFU_VERSION }}
      - uses: ship-iac/shipmate/actions/apply-cell@dc38d5fc201f833c899bdbeecd0a6fe1cd6b6821
        with:
          stack: ${{ matrix.stack }}
          stack-name: ${{ matrix.stack }}
          env: ${{ matrix.environment }}
          head-sha: ${{ needs.detect.outputs.head_sha }}
          preview-run-id: ${{ needs.detect.outputs.preview_run_id }}
          state-path: ${{ matrix.stack }}/terraform.tfstate
          github-token: ${{ github.token }}

  wave7:
    needs: [detect, wave0, wave1, wave2, wave3, wave4, wave5, wave6]
    if: ${{ !failure() && !cancelled() && needs.detect.outputs.wave7 != '[]' }}
    runs-on: ubuntu-latest
    permissions: { contents: read, checks: write, actions: read }
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.detect.outputs.wave7) }}
    environment: ${{ matrix.environment }}-apply
    concurrency:
      group: apply-${{ matrix.environment }}-${{ matrix.stack }}
      cancel-in-progress: false
    name: apply / ${{ matrix.environment }} / ${{ matrix.stack }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          ref: ${{ needs.detect.outputs.head_sha }}
      - uses: ship-iac/shipmate/actions/setup@dc38d5fc201f833c899bdbeecd0a6fe1cd6b6821
        with:
          terramate-version: ${{ vars.TERRAMATE_VERSION }}
          tofu-version: ${{ vars.TOFU_VERSION }}
      - uses: ship-iac/shipmate/actions/apply-cell@dc38d5fc201f833c899bdbeecd0a6fe1cd6b6821
        with:
          stack: ${{ matrix.stack }}
          stack-name: ${{ matrix.stack }}
          env: ${{ matrix.environment }}
          head-sha: ${{ needs.detect.outputs.head_sha }}
          preview-run-id: ${{ needs.detect.outputs.preview_run_id }}
          state-path: ${{ matrix.stack }}/terraform.tfstate
          github-token: ${{ github.token }}

  summary:
    needs: [detect, wave0, wave1, wave2, wave3, wave4, wave5, wave6, wave7]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: App token for result comment
        id: token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.SHIPMATE_APP_ID }}
          private-key: ${{ secrets.SHIPMATE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}
      - name: Result comment via the App (does NOT complete checkmate)
        env:
          GH_TOKEN: ${{ steps.token.outputs.token }}
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
          ENVIRONMENT: ${{ github.event.inputs.environment }}
          RESULTS: ${{ join(needs.*.result, ',') }}
        run: |
          set -euo pipefail
          if echo "$RESULTS" | grep -q failure; then emoji=":x:"; word="failed";
          else emoji=":white_check_mark:"; word="applied"; fi
          python3 - "$emoji" "$word" "$ENVIRONMENT" > body.json <<'PY'
          import json, sys
          emoji, word, env = sys.argv[1:4]
          print(json.dumps({"body": f"{emoji} shipmate: `mate apply {env}` {word}. "
                                     f"`shipmate / checkmate` stays pending until every "
                                     f"environment is applied (or the merge deploy runs)."}))
          PY
          gh api -X POST "repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/comments" --input body.json >/dev/null
